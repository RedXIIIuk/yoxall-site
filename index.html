<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#050608" />
  <title>Letter mask · Yoxall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #050608;
      --bg: #080a0e;
      --elev: #0d1018;
      --panel: rgba(12, 15, 22, 0.72);
      --panel-solid: #0c0f16;
      --border: rgba(230, 237, 243, 0.08);
      --border-bright: rgba(94, 234, 212, 0.22);
      --text: #e8ecf1;
      --muted: #8b95a5;
      --teal: #2dd4bf;
      --teal-dim: rgba(45, 212, 191, 0.12);
      --amber: #d4a574;
      --amber-bright: #e8bc8c;
      --amber-deep: #9a6b3f;
      --shadow-glow: 0 0 32px rgba(45, 212, 191, 0.06);
    }
    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: var(--void);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
      position: relative;
    }
    /* Subtle datum grid — texture, not gimmick */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 85% 70% at 50% 0%, black 0%, transparent 72%);
    }
    .app-shell {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header.top-bar {
      padding: 1.1rem 1.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(13, 16, 24, 0.95) 0%, rgba(8, 10, 14, 0.88) 100%);
      backdrop-filter: blur(12px);
    }
    header.top-bar::after {
      content: "";
      display: block;
      height: 1px;
      margin-top: 1rem;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
      opacity: 0.5;
    }
    .brand {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.65rem 1rem;
    }
    .brand-logo-link {
      display: flex;
      align-items: center;
      line-height: 1.2;
      text-decoration: none;
      border-radius: 2px;
      transition: opacity 0.15s, filter 0.15s;
    }
    .brand-logo-link:hover {
      opacity: 0.92;
    }
    .brand-logo-link:hover .brand-wordmark::after {
      opacity: 1;
    }
    .brand-logo-link:focus-visible {
      outline: 1px solid rgba(45, 212, 191, 0.65);
      outline-offset: 4px;
    }
    /* Vector-free wordmark: always uses the same tokens as the rest of the UI */
    .brand-wordmark {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-weight: 600;
      font-size: clamp(1.12rem, 3.3vw, 1.62rem);
      letter-spacing: 0.2em;
      color: var(--text);
      text-transform: none;
      display: inline-block;
      position: relative;
      padding-bottom: 0.42rem;
    }
    .brand-wordmark::first-letter {
      color: var(--teal);
      font-weight: 600;
    }
    .brand-wordmark::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      bottom: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        var(--teal) 0%,
        rgba(45, 212, 191, 0.2) 38%,
        var(--amber) 100%
      );
      opacity: 0.88;
      transition: opacity 0.15s;
    }
    .brand-product {
      margin: 0;
      font-family: "Caveat", cursive;
      font-size: clamp(0.88rem, 2.1vw, 1rem);
      font-weight: 600;
      font-style: normal;
      letter-spacing: 0.01em;
      line-height: 1.25;
      color: var(--muted);
      padding-left: 0.85rem;
      border-left: 1px solid var(--border);
      max-width: min(28rem, 100%);
    }
    .thanks-foot {
      margin: 1rem 0 0;
      padding-left: 0;
      border-left: none;
    }
    main {
      flex: 1;
      padding: 1.35rem 1.5rem 2.75rem;
      max-width: 1680px;
      margin: 0 auto;
      width: 100%;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.35rem;
      align-items: flex-end;
      margin-bottom: 1.35rem;
    }
    .field label {
      display: block;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .field.label-readable label {
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .field input[type="text"] {
      width: min(100%, 280px);
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--elev);
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input[type="text"]:focus {
      outline: none;
      border-color: rgba(212, 165, 116, 0.45);
      box-shadow: 0 0 0 1px rgba(212, 165, 116, 0.15);
    }
    input[type="range"] {
      accent-color: var(--teal);
    }
    .field input[type="range"] {
      width: 148px;
      vertical-align: middle;
    }
    .field select {
      padding: 0.5rem 0.65rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--elev);
      color: var(--text);
      font-size: 0.875rem;
      min-width: 10.5rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .field select:focus {
      outline: none;
      border-color: rgba(45, 212, 191, 0.35);
    }
    .field input[type="number"].zoom-num {
      width: 4rem;
      padding: 0.35rem 0.45rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--elev);
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
    }
    .val-pill {
      display: inline-block;
      margin-left: 0.35rem;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--teal);
      opacity: 0.9;
    }
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 2px;
      padding: 0.58rem 1.15rem;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: linear-gradient(165deg, var(--amber-bright) 0%, var(--amber) 42%, var(--amber-deep) 100%);
      color: #0a0604;
      box-shadow: var(--shadow-glow), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) {
      filter: brightness(1.06);
    }
    .btn:active:not(:disabled) {
      transform: translateY(1px);
    }
    .btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      filter: grayscale(0.3);
    }
    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
      font-weight: 500;
    }
    .btn.secondary:hover:not(:disabled) {
      border-color: rgba(45, 212, 191, 0.35);
      background: var(--teal-dim);
    }
    .btn.small {
      padding: 0.32rem 0.5rem;
      font-size: 0.78rem;
      min-width: 2.1rem;
    }
    .letters {
      display: flex;
      flex-wrap: wrap;
      gap: 1.1rem;
      align-items: flex-start;
    }
    .letter-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.85rem;
      width: fit-content;
      min-width: 5.5rem;
      max-width: min(22rem, 100%);
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }
    .letter-card .glyph {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-weight: bold;
      font-size: 1.5rem;
      text-align: center;
      color: var(--muted);
      user-select: none;
      letter-spacing: 0.02em;
    }
    .letter-card .viewport {
      border-radius: 2px;
      overflow: hidden;
      background: #040508;
      border: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      box-shadow: inset 0 0 0 1px rgba(45, 212, 191, 0.04);
    }
    .letter-card canvas {
      display: block;
      width: auto;
      height: auto;
      max-height: 29rem;
      max-width: 100%;
      cursor: grab;
      touch-action: none;
    }
    .letter-card canvas:active { cursor: grabbing; }
    .zoom-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .zoom-row .zoom-val {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 3rem;
    }
    .zoom-row input[type="range"] {
      flex: 1;
      min-width: 80px;
      height: 1.35rem;
    }
    .letter-card .actions {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .letter-card .actions .btn.ghost-clear {
      font-size: 0.76rem;
      padding: 0.42rem 0.55rem;
      font-weight: 500;
    }
    .letter-card .actions label.file {
      display: block;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.45rem;
      border-radius: 2px;
      border: 1px dashed rgba(230, 237, 243, 0.14);
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .letter-card .actions label.file:hover {
      border-color: rgba(45, 212, 191, 0.35);
      color: var(--teal);
      background: var(--teal-dim);
    }
    .letter-card .actions input[type="file"] { display: none; }
    .preview-row {
      margin-top: 2.25rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .preview-head {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .preview-head h2 {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin: 0;
    }
    .preview-head .rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }
    .preview-wrap {
      position: relative;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1rem 1.1rem;
      overflow: auto;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.45);
    }
    /* Corner ticks — readout frame, not decoration overload */
    .preview-wrap::before,
    .preview-wrap::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: rgba(45, 212, 191, 0.35);
      border-style: solid;
      pointer-events: none;
      z-index: 2;
    }
    .preview-wrap::before {
      top: 6px;
      left: 6px;
      border-width: 1px 0 0 1px;
    }
    .preview-wrap::after {
      bottom: 6px;
      right: 6px;
      border-width: 0 1px 1px 0;
    }
    #exportCanvas {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      border-radius: 1px;
      border: 1px solid rgba(0, 0, 0, 0.5);
      background: #030406;
      position: relative;
      z-index: 1;
    }
    .export-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      margin-top: 1.1rem;
    }
    .status {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      margin-top: 0.85rem;
      min-height: 1.2rem;
      color: var(--muted);
    }
    .status.ok { color: #5eead4; }
    .status.err { color: #f0a8a8; }
    .empty-state {
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.75rem 0 0;
    }
    .btn:focus-visible,
    .field input:focus-visible,
    .field select:focus-visible {
      outline: 1px solid rgba(45, 212, 191, 0.65);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <a class="brand-logo-link" href="https://yoxall.net/" target="_blank" rel="noopener noreferrer" aria-label="Yoxall — yoxall.net">
          <span class="brand-wordmark">Yoxall</span>
        </a>
        <p class="brand-product">Making the stuff you like because we can!</p>
      </div>
    </header>
    <main>
    <div class="controls">
      <div class="field label-readable">
        <label for="wordInput">Enter name</label>
        <input id="wordInput" type="text" maxlength="16" placeholder="HOME" autocomplete="off" spellcheck="false" aria-label="Enter name" />
      </div>
      <div class="field label-readable">
        <label for="fontFamilySelect">Select font</label>
        <select id="fontFamilySelect" aria-label="Select font">
          <option value="impact" selected>Impact</option>
          <option value="arialBlack">Arial Black</option>
          <option value="haettenschweiler">Haettenschweiler</option>
          <option value="franklin">Franklin Gothic Heavy</option>
          <option value="britannic">Britannic Bold</option>
          <option value="cooper">Cooper Black</option>
          <option value="trebuchet">Trebuchet MS (bold)</option>
        </select>
      </div>
      <div class="field label-readable">
        <label for="outlineRange">Outline thickness</label>
        <input id="outlineRange" type="range" min="0.5" max="16" value="2" step="0.5" aria-label="Outline thickness" />
        <span id="outlineVal" class="val-pill">2px</span>
      </div>
      <div class="field label-readable">
        <label for="outlineColorSelect">Outline colour</label>
        <select id="outlineColorSelect" aria-label="Outline colour">
          <option value="black" selected>Black</option>
          <option value="white">White</option>
        </select>
      </div>
      <button type="button" class="btn secondary" id="btnResetWord">Reset layout</button>
    </div>
    <div id="lettersHost" class="letters"></div>
    <p id="emptyMsg" class="empty-state" hidden>Awaiting input</p>

    <div class="preview-row">
      <div class="preview-head">
        <h2>Composite</h2>
        <span class="rule" aria-hidden="true"></span>
      </div>
      <div class="preview-wrap">
        <canvas id="exportCanvas" width="800" height="320"></canvas>
      </div>
      <div class="export-actions">
        <button type="button" class="btn" id="btnDownload" disabled>Download PNG</button>
        <button type="button" class="btn secondary" id="btnEmail" disabled>Upload to workshop</button>
      </div>
      <p class="brand-product thanks-foot">Thanks x</p>
      <div class="status" id="statusLine" role="status"></div>
    </div>
    </main>
  </div>

  <script>
(function () {
  /**
   * Static hosting — uploads go through Formspree (free tier works for modest PNG sizes).
   * 1. Create an account at https://formspree.io
   * 2. New form → set “Send submissions to” to your Zoho address (e.g. you@yoxall.net)
   * 3. Copy the form id from the integration URL (…/f/xxxxxxxx) and paste it below.
   * 4. Deploy only the wwwroot/ folder; no server or SMTP required.
   */
  const FORMSPREE_FORM_ID = "";

  const wordInput = document.getElementById("wordInput");
  const lettersHost = document.getElementById("lettersHost");
  const emptyMsg = document.getElementById("emptyMsg");
  const outlineRange = document.getElementById("outlineRange");
  const outlineVal = document.getElementById("outlineVal");
  const outlineColorSelect = document.getElementById("outlineColorSelect");
  const fontFamilySelect = document.getElementById("fontFamilySelect");
  const exportCanvas = document.getElementById("exportCanvas");
  const btnResetWord = document.getElementById("btnResetWord");
  const btnDownload = document.getElementById("btnDownload");
  const btnEmail = document.getElementById("btnEmail");
  const statusLine = document.getElementById("statusLine");

  /** Physical plate (mm) */
  const MM_PLATE_W = 84;
  const MM_PLATE_H = 52;
  const MM_BORDER = 5;
  /** Minimum gap between glyphs on the print (mm); keeps strokes from touching */
  const EXPORT_GAP_MM = 0.032;
  /** Inner printable area (mm) inside the 5 mm frame */
  const MM_INNER_W = MM_PLATE_W - 2 * MM_BORDER;
  const MM_INNER_H = MM_PLATE_H - 2 * MM_BORDER;
  /** Combined preview: inner width in px (height follows plate aspect) */
  const PREVIEW_INNER_W = 820;
  /** Zoom UI: 1%–100% (photo scale inside mask) */
  const ZOOM_MIN = 1;
  const ZOOM_MAX = 100;
  const SCALE_MIN = 0.01;
  const SCALE_MAX = 1;

  /** Current editor cell size — same aspect as one lithophane column for this word length */
  let editorCellW = 220;
  let editorCellH = 275;

  let cachedMaxDpi = 0;
  function getMaxExportDpi() {
    if (cachedMaxDpi > 0) return cachedMaxDpi;
    const maxDim = 8192;
    const maxArea = 268435456;
    let dpi = Math.floor(Math.min((maxDim * 25.4) / MM_PLATE_W, (maxDim * 25.4) / MM_PLATE_H));
    while (dpi >= 72) {
      const W = Math.ceil((MM_PLATE_W * dpi) / 25.4);
      const H = Math.ceil((MM_PLATE_H * dpi) / 25.4);
      if (W <= maxDim && H <= maxDim && W * H <= maxArea) break;
      dpi--;
    }
    cachedMaxDpi = Math.max(72, dpi);
    return cachedMaxDpi;
  }

  /** Bold display stacks for all-caps masking (Impact default). */
  const FONT_STACKS = {
    impact: 'Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif',
    arialBlack: '"Arial Black", Gadget, sans-serif',
    haettenschweiler: 'Haettenschweiler, "Franklin Gothic Heavy", Impact, sans-serif',
    franklin: '"Franklin Gothic Heavy", "Arial Black", Impact, sans-serif',
    britannic: '"Britannic Bold", "Arial Black", Impact, sans-serif',
    cooper: '"Cooper Black", "Arial Black", Impact, sans-serif',
    trebuchet: '"Trebuchet MS", "Lucida Grande", "Arial Black", sans-serif',
  };

  function getFontStack() {
    const k = fontFamilySelect && fontFamilySelect.value;
    return FONT_STACKS[k] || FONT_STACKS.impact;
  }

  /** @type {{ char: string, img: HTMLImageElement | null, scale: number, ox: number, oy: number, cellW: number, cellH: number, layoutFontSize: number, canvas: HTMLCanvasElement, ctx: CanvasRenderingContext2D, fileInput: HTMLInputElement, zoomInput: HTMLInputElement, zoomNumber: HTMLInputElement, zoomLabel: HTMLElement }[]} */
  let slots = [];

  function allowedChars(word) {
    return word.toUpperCase().split("").filter(c => /[A-Z0-9]/.test(c));
  }

  function setStatus(text, kind) {
    statusLine.textContent = text || "";
    statusLine.className = "status" + (kind === "ok" ? " ok" : kind === "err" ? " err" : "");
  }

  function innerHeightPreviewPx() {
    return Math.round((PREVIEW_INNER_W * MM_INNER_H) / MM_INNER_W);
  }

  /** Outline slider is “px at preview inner height”; scale to any raster height */
  function outlinePxAtHeight(targetHPx) {
    const ref = Math.max(1, innerHeightPreviewPx());
    return Number(outlineRange.value) * (targetHPx / ref);
  }

  function formatOutlinePxLabel() {
    const v = Number(outlineRange.value);
    const s = Number.isInteger(v) ? String(v) : v.toFixed(1);
    return `${s}px`;
  }

  /** Fully opaque stroke for lithophane (no gray fringe) */
  function getOutlineColor() {
    return outlineColorSelect.value === "white" ? "#ffffff" : "#000000";
  }

  function fitFontSize(ctx, letter, maxW, maxH) {
    let low = 8;
    let high = Math.min(maxW, maxH);
    let best = low;
    while (low <= high) {
      const mid = (low + high) >> 1;
      ctx.font = `bold ${mid}px ${getFontStack()}`;
      const m = ctx.measureText(letter);
      const w = m.width;
      const h = mid * 0.85;
      if (w <= maxW * 0.97 && h <= maxH * 0.93) {
        best = mid;
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }
    return Math.max(12, best);
  }

  /**
   * One solid outline band (no strokeText — canvas strokes are centered on the path and AA reads as two thin lines).
   * Filled glyph minus a slightly smaller glyph = uniform ring in opaque color.
   */
  function drawSolidOutlineRing(ctx, w, h, letter, cx, cy, fs, outlinePx, fillRgb) {
    if (outlinePx <= 0) return;
    const ring = document.createElement("canvas");
    ring.width = w;
    ring.height = h;
    const r = ring.getContext("2d");
    if (!r) return;

    r.font = `bold ${fs}px ${getFontStack()}`;
    r.textAlign = "center";
    r.textBaseline = "middle";
    r.fillStyle = fillRgb;
    r.fillText(letter, cx, cy);

    const capApprox = fs * 0.9;
    const shrink = Math.max(0.52, 1 - (2 * outlinePx) / Math.max(1, capApprox));

    r.globalCompositeOperation = "destination-out";
    r.fillStyle = "#ffffff";
    r.save();
    r.translate(cx, cy);
    r.scale(shrink, shrink);
    r.translate(-cx, -cy);
    r.fillText(letter, cx, cy);
    r.restore();

    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.drawImage(ring, 0, 0);
    ctx.restore();
  }

  /**
   * Draw one masked letter into an existing context (uses destination-in — isolate to small canvases only).
   * @param {number | null} forcedFontSize  If set (px for this canvas), used instead of auto fit — for packed row layout.
   */
  function drawMaskedLetter(ctx, w, h, letter, img, scale, ox, oy, outlinePx, forcedFontSize) {
    if (!letter) return;

    const fontSize =
      forcedFontSize != null && forcedFontSize > 0
        ? forcedFontSize
        : fitFontSize(ctx, letter, w, h);
    const fs = Math.max(8, fontSize);
    ctx.font = `bold ${fs}px ${getFontStack()}`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const cx = w / 2;
    const cy = h / 2;

    ctx.save();
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.translate(cx + ox, cy + oy);
      ctx.scale(scale, scale);
      ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    } else {
      ctx.fillStyle = "#12161f";
      ctx.fillRect(0, 0, w, h);
    }
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = "destination-in";
    ctx.font = `bold ${fs}px ${getFontStack()}`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#ffffff";
    ctx.fillText(letter, cx, cy);
    ctx.restore();

    const strokeColor = getOutlineColor();
    drawSolidOutlineRing(ctx, w, h, letter, cx, cy, fs, outlinePx, strokeColor);
  }

  /**
   * Render one letter to its own canvas so compositing never wipes other letters on a shared surface.
   * Scales photo by target height vs editor ref so glyphs and images stay proportional (fixes tiny photos on export).
   */
  function letterToOffscreen(slot, w, h, outlinePx, packedFontSizeAtPreview) {
    const c = document.createElement("canvas");
    c.width = Math.max(1, Math.round(w));
    c.height = Math.max(1, Math.round(h));
    const ctx = c.getContext("2d");
    if (!ctx) return c;
    const refW = Math.max(1, slot.cellW);
    const refH = Math.max(1, slot.cellH);
    const sx = c.width / refW;
    const sy = c.height / refH;
    const imageScale = slot.scale * (c.height / refH);
    const pfs = packedFontSizeAtPreview > 0 ? packedFontSizeAtPreview : slot.layoutFontSize;
    const drawFs = pfs > 0 ? pfs * (c.height / refH) : null;
    drawMaskedLetter(
      ctx,
      c.width,
      c.height,
      slot.char,
      slot.img,
      imageScale,
      slot.ox * sx,
      slot.oy * sy,
      outlinePx,
      drawFs
    );
    return c;
  }

  function renderSlot(slot) {
    const outlinePx = outlinePxAtHeight(slot.canvas.height);
    const { ctx, canvas } = slot;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const drawFs = slot.layoutFontSize > 0 ? slot.layoutFontSize : null;
    drawMaskedLetter(ctx, canvas.width, canvas.height, slot.char, slot.img, slot.scale, slot.ox, slot.oy, outlinePx, drawFs);
  }

  function clampZoomPercent(p) {
    const n = Number(p);
    if (!Number.isFinite(n)) return 100;
    return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, Math.round(n)));
  }

  function updateZoomLabel(slot) {
    slot.scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, slot.scale));
    const pct = clampZoomPercent(Math.round(slot.scale * 100));
    slot.scale = pct / 100;
    slot.zoomLabel.textContent = `${pct}%`;
    slot.zoomInput.value = String(pct);
    slot.zoomNumber.value = String(pct);
  }

  /**
   * Pack glyphs: one font size for the row, each cell width ≈ glyph advance — maximized to fill innerW × innerH.
   * @returns {{ n: number, gapPx: number, widths: number[], ch: number, fontSize: number, totalWidth: number } | null}
   */
  function computePackedLayout(innerWpx, innerHpx, gapPxInput, charList) {
    const n = charList.length;
    if (n === 0) return null;
    const m = document.createElement("canvas").getContext("2d");
    if (!m) return null;

    const g = Math.max(0, Math.round(gapPxInput));
    const vFill = 0.995;
    const capRatio = 0.96;
    const maxH = Math.floor(innerHpx * vFill);
    let low = 8;
    let high = maxH;
    let best = 8;

    while (low <= high) {
      const mid = (low + high) >> 1;
      m.font = `bold ${mid}px ${getFontStack()}`;
      let tw = 0;
      for (let i = 0; i < n; i++) {
        tw += m.measureText(charList[i]).width;
      }
      tw += (n - 1) * g;
      const capH = mid * capRatio;
      if (tw <= innerWpx + 0.75 && capH <= innerHpx * vFill) {
        best = mid;
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    let fontSize = Math.max(12, best);
    m.font = `bold ${fontSize}px ${getFontStack()}`;
    while (fontSize < maxH) {
      const tryFs = fontSize + 1;
      m.font = `bold ${tryFs}px ${getFontStack()}`;
      let tw = 0;
      for (let i = 0; i < n; i++) {
        tw += Math.ceil(m.measureText(charList[i]).width);
      }
      tw += (n - 1) * g;
      if (tw <= innerWpx && tryFs * capRatio <= innerHpx * vFill) fontSize = tryFs;
      else break;
    }

    m.font = `bold ${fontSize}px ${getFontStack()}`;
    const widths = [];
    for (let i = 0; i < n; i++) {
      widths.push(Math.max(1, Math.ceil(m.measureText(charList[i]).width)));
    }
    let totalWidth = widths.reduce((a, b) => a + b, 0) + (n - 1) * g;
    let spare = innerWpx - totalWidth;
    let si = 0;
    while (spare > 0) {
      widths[si % n]++;
      spare--;
      si++;
    }
    totalWidth = widths.reduce((a, b) => a + b, 0) + (n - 1) * g;

    const ch = Math.max(1, innerHpx);
    return { n, gapPx: g, widths, ch, fontSize, totalWidth };
  }

  function drawPackedRow(ctx, originX, originY, innerWpx, layout) {
    const { widths, gapPx, ch, fontSize } = layout;
    const total = layout.totalWidth;
    let x = originX + Math.floor((innerWpx - total) / 2);
    for (let i = 0; i < layout.n; i++) {
      const slot = slots[i];
      const cw = widths[i];
      const oPx = outlinePxAtHeight(ch);
      const piece = letterToOffscreen(slot, cw, ch, oPx, fontSize);
      ctx.drawImage(piece, Math.round(x), Math.round(originY));
      x += cw + gapPx;
    }
  }

  function renderExportPreview() {
    const innerW = PREVIEW_INNER_W;
    const innerH = innerHeightPreviewPx();
    const gapPrev = Math.max(0, Math.round((EXPORT_GAP_MM * innerW) / MM_INNER_W));

    exportCanvas.width = Math.max(1, innerW);
    exportCanvas.height = Math.max(1, innerH);
    const xctx = exportCanvas.getContext("2d");
    if (!xctx) return;
    xctx.setTransform(1, 0, 0, 1, 0, 0);
    xctx.clearRect(0, 0, exportCanvas.width, exportCanvas.height);

    const charList = slots.map(s => s.char);
    const layout = computePackedLayout(innerW, innerH, gapPrev, charList);
    if (layout) drawPackedRow(xctx, 0, 0, innerW, layout);

  }

  function refreshButtons() {
    const ok = slots.length > 0;
    btnDownload.disabled = !ok;
    btnEmail.disabled = !ok;
  }

  function renderAll() {
    slots.forEach(renderSlot);
    slots.forEach(updateZoomLabel);
    renderExportPreview();
    refreshButtons();
  }

  function resetTransforms() {
    slots.forEach(s => {
      s.scale = 1;
      s.ox = 0;
      s.oy = 0;
    });
    renderAll();
  }

  function resetSlot(slot) {
    slot.scale = 1;
    slot.ox = 0;
    slot.oy = 0;
    renderSlot(slot);
    updateZoomLabel(slot);
    renderExportPreview();
  }

  function attachPointerPanZoom(canvas, slot) {
    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    canvas.addEventListener("pointerdown", e => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener("pointermove", e => {
      if (!dragging) return;
      const dxScr = e.clientX - lastX;
      const dyScr = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      const r = canvas.getBoundingClientRect();
      const sx = r.width > 0 ? canvas.width / r.width : 1;
      const sy = r.height > 0 ? canvas.height / r.height : 1;
      slot.ox += dxScr * sx;
      slot.oy += dyScr * sy;
      renderSlot(slot);
      renderExportPreview();
    });
    function endDrag(e) {
      dragging = false;
      try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    canvas.addEventListener("pointerup", endDrag);
    canvas.addEventListener("pointercancel", endDrag);

    canvas.addEventListener(
      "wheel",
      e => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.94 : 1.06;
        slot.scale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, slot.scale * factor));
        renderSlot(slot);
        updateZoomLabel(slot);
        renderExportPreview();
      },
      { passive: false }
    );
  }

  function applyZoomFromInput(slot, percent) {
    const p = clampZoomPercent(percent);
    slot.scale = p / 100;
    renderSlot(slot);
    updateZoomLabel(slot);
    renderExportPreview();
  }

  function createCard(char, index, cellW, cellH, layoutFontSize) {
    const card = document.createElement("div");
    card.className = "letter-card";

    const glyph = document.createElement("div");
    glyph.className = "glyph";
    glyph.textContent = char;
    glyph.style.fontFamily = getFontStack();

    const viewport = document.createElement("div");
    viewport.className = "viewport";

    const canvas = document.createElement("canvas");
    canvas.width = cellW;
    canvas.height = cellH;
    const ctx = canvas.getContext("2d");
    if (!ctx) return null;

    viewport.appendChild(canvas);

    const zoomRow = document.createElement("div");
    zoomRow.className = "zoom-row";

    const zoomMinus = document.createElement("button");
    zoomMinus.type = "button";
    zoomMinus.className = "btn secondary small";
    zoomMinus.textContent = "−";
    zoomMinus.title = "Zoom out";

    const zoomPlus = document.createElement("button");
    zoomPlus.type = "button";
    zoomPlus.className = "btn secondary small";
    zoomPlus.textContent = "+";
    zoomPlus.title = "Zoom in";

    const zoomInput = document.createElement("input");
    zoomInput.type = "range";
    zoomInput.min = String(ZOOM_MIN);
    zoomInput.max = String(ZOOM_MAX);
    zoomInput.step = "1";
    zoomInput.value = "100";
    zoomInput.setAttribute("aria-label", `Zoom for letter ${char}`);

    const zoomNumber = document.createElement("input");
    zoomNumber.type = "number";
    zoomNumber.className = "zoom-num";
    zoomNumber.min = String(ZOOM_MIN);
    zoomNumber.max = String(ZOOM_MAX);
    zoomNumber.step = "1";
    zoomNumber.value = "100";
    zoomNumber.title = "Photo zoom % (1–100)";

    const zoomLabel = document.createElement("span");
    zoomLabel.className = "zoom-val";
    zoomLabel.textContent = "100%";

    const btnResetOne = document.createElement("button");
    btnResetOne.type = "button";
    btnResetOne.className = "btn secondary small";
    btnResetOne.textContent = "Reset";
    btnResetOne.title = "Reset this letter’s photo pan and zoom to defaults";

    zoomRow.appendChild(zoomMinus);
    zoomRow.appendChild(zoomInput);
    zoomRow.appendChild(zoomPlus);
    zoomRow.appendChild(zoomNumber);
    zoomRow.appendChild(zoomLabel);
    zoomRow.appendChild(btnResetOne);

    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";

    const label = document.createElement("label");
    label.className = "file";
    label.htmlFor = `f-${index}-${char}`;
    fileInput.id = `f-${index}-${char}`;
    label.textContent = "Import";

    const clearBtn = document.createElement("button");
    clearBtn.type = "button";
    clearBtn.className = "btn secondary ghost-clear";
    clearBtn.textContent = "Clear";

    const actions = document.createElement("div");
    actions.className = "actions";
    actions.appendChild(zoomRow);
    actions.appendChild(label);
    actions.appendChild(fileInput);
    actions.appendChild(clearBtn);

    const slot = {
      char,
      img: null,
      scale: 1,
      ox: 0,
      oy: 0,
      cellW,
      cellH,
      layoutFontSize: layoutFontSize || 0,
      canvas,
      ctx,
      fileInput,
      zoomInput,
      zoomNumber,
      zoomLabel,
    };

    zoomInput.addEventListener("input", () => {
      applyZoomFromInput(slot, Number(zoomInput.value));
    });
    zoomNumber.addEventListener("change", () => {
      applyZoomFromInput(slot, Number(zoomNumber.value));
    });
    zoomMinus.addEventListener("click", () => {
      applyZoomFromInput(slot, Number(zoomInput.value) - 5);
    });
    zoomPlus.addEventListener("click", () => {
      applyZoomFromInput(slot, Number(zoomInput.value) + 5);
    });
    btnResetOne.addEventListener("click", () => resetSlot(slot));

    fileInput.addEventListener("change", () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return;
      const url = URL.createObjectURL(f);
      const im = new Image();
      im.onload = () => {
        URL.revokeObjectURL(url);
        slot.img = im;
        resetSlot(slot);
      };
      im.onerror = () => URL.revokeObjectURL(url);
      im.src = url;
    });

    clearBtn.addEventListener("click", () => {
      slot.img = null;
      fileInput.value = "";
      resetSlot(slot);
    });

    attachPointerPanZoom(canvas, slot);

    card.appendChild(glyph);
    card.appendChild(viewport);
    card.appendChild(actions);

    lettersHost.appendChild(card);
    return slot;
  }

  /**
   * @param {typeof slots | null | undefined} prevSlots  If letters match `chars`, copy img / pan / zoom into new cards (font change).
   */
  function rebuild(prevSlots) {
    const chars = allowedChars(wordInput.value || "");
    const prev = prevSlots;
    const canPreserve =
      prev &&
      prev.length === chars.length &&
      prev.every((s, i) => s && s.char === chars[i]);

    lettersHost.innerHTML = "";
    slots = [];
    emptyMsg.hidden = chars.length > 0;
    setStatus("");

    const n = chars.length;
    const innerHPr = innerHeightPreviewPx();
    const gapPrev = Math.max(0, Math.round((EXPORT_GAP_MM * PREVIEW_INNER_W) / MM_INNER_W));
    const packed = n > 0 ? computePackedLayout(PREVIEW_INNER_W, innerHPr, gapPrev, chars) : null;

    if (n > 0) {
      editorCellH = innerHPr;
      editorCellW = packed ? packed.widths[0] : 220;
    } else {
      editorCellH = 275;
      editorCellW = 220;
    }

    chars.forEach((c, i) => {
      const cw = packed ? packed.widths[i] : 220;
      const ch = packed ? packed.ch : 275;
      const fs = packed ? packed.fontSize : 0;
      const s = createCard(c, i, cw, ch, fs);
      if (!s) return;
      if (canPreserve && prev[i]) {
        const p = prev[i];
        s.img = p.img;
        s.scale = p.scale;
        s.ox = p.ox;
        s.oy = p.oy;
        updateZoomLabel(s);
      }
      slots.push(s);
    });
    renderAll();
  }

  /**
   * Master strip at preview pixel size — identical pipeline to on-screen combined preview.
   * Re-rendering masks at multi‑k px breaks canvas text + destination-in on many browsers.
   */
  function buildMasterStripCanvas() {
    const innerW = PREVIEW_INNER_W;
    const innerH = innerHeightPreviewPx();
    const gapPrev = Math.max(0, Math.round((EXPORT_GAP_MM * innerW) / MM_INNER_W));
    const charList = slots.map(s => s.char);
    const layout = computePackedLayout(innerW, innerH, gapPrev, charList);
    const strip = document.createElement("canvas");
    strip.width = Math.max(1, innerW);
    strip.height = Math.max(1, innerH);
    const sctx = strip.getContext("2d");
    if (!sctx || !layout) return strip;
    sctx.setTransform(1, 0, 0, 1, 0, 0);
    sctx.clearRect(0, 0, strip.width, strip.height);
    drawPackedRow(sctx, 0, 0, innerW, layout);
    return strip;
  }

  function buildPrintReadyCanvas() {
    const dpi = getMaxExportDpi();
    const pxPerMm = dpi / 25.4;
    const W = Math.round(MM_PLATE_W * pxPerMm);
    const H = Math.round(MM_PLATE_H * pxPerMm);
    const b = Math.round(MM_BORDER * pxPerMm);
    const innerW = Math.max(1, W - 2 * b);
    const innerH = Math.max(1, H - 2 * b);

    const canvas = document.createElement("canvas");
    canvas.width = W;
    canvas.height = H;
    const ctx = canvas.getContext("2d");
    if (!ctx) return canvas;

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, W, H);

    const strip = buildMasterStripCanvas();
    if (slots.length === 0) return canvas;

    ctx.imageSmoothingEnabled = true;
    if ("imageSmoothingQuality" in ctx) ctx.imageSmoothingQuality = "high";
    ctx.drawImage(strip, 0, 0, strip.width, strip.height, b, b, innerW, innerH);

    return canvas;
  }

  async function submitEmail() {
    setStatus("");
    const id = (FORMSPREE_FORM_ID || "").trim();
    if (!id) {
      setStatus("Upload isn’t configured — add Formspree id in the page script.", "err");
      return;
    }
    const c = buildPrintReadyCanvas();
    const blob = await new Promise(resolve => c.toBlob(resolve, "image/png"));
    if (!blob) {
      setStatus("Could not render file.", "err");
      return;
    }
    const word = (wordInput.value || "").trim() || "(none)";
    const base =
      (wordInput.value || "lithophane").replace(/[^a-z0-9]+/gi, "-").toLowerCase() || "lithophane";
    const fd = new FormData();
    fd.append("_subject", `Letter mask — ${word}`);
    fd.append("word", word);
    fd.append("attachment", blob, `${base}.png`);

    btnEmail.disabled = true;
    try {
      const res = await fetch(`https://formspree.io/f/${id}`, {
        method: "POST",
        body: fd,
        headers: { Accept: "application/json" },
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok)
        setStatus("Received.", "ok");
      else {
        const msg =
          (data && (data.error || (data.errors && data.errors[0] && data.errors[0].message))) ||
          "Unavailable.";
        setStatus(typeof msg === "string" ? msg : "Unavailable.", "err");
      }
    } catch (e) {
      setStatus("Connection failed.", "err");
    } finally {
      btnEmail.disabled = slots.length === 0;
    }
  }

  wordInput.addEventListener("input", rebuild);
  outlineRange.addEventListener("input", () => {
    outlineVal.textContent = formatOutlinePxLabel();
    renderAll();
  });
  outlineColorSelect.addEventListener("change", () => {
    renderAll();
  });
  fontFamilySelect.addEventListener("change", () => rebuild(slots.slice()));
  btnResetWord.addEventListener("click", resetTransforms);
  btnDownload.addEventListener("click", () => {
    setStatus("");
    const c = buildPrintReadyCanvas();
    c.toBlob(blob => {
      if (!blob) {
        setStatus("Could not render file.", "err");
        return;
      }
      const a = document.createElement("a");
      const base = (wordInput.value || "lithophane").replace(/[^a-z0-9]+/gi, "-").toLowerCase() || "lithophane";
      const dpi = getMaxExportDpi();
      a.download = `${base}-${MM_PLATE_W}x${MM_PLATE_H}mm-${dpi}dpi-max.png`;
      a.href = URL.createObjectURL(blob);
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus("Saved.", "ok");
    }, "image/png");
  });
  btnEmail.addEventListener("click", () => submitEmail());

  outlineVal.textContent = formatOutlinePxLabel();
  rebuild();
})();
  </script>
</body>
